services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuroai-app
    ports:
      - '8000:8000'
    env_file:
      - .env
    environment:
      APP_PORT: 8000
      DB_HOST: db
      DB_PORT: 3306
      DB_DIALECT: mysql
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: neuroai-mysql
    ports:
      - '3307:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: neuroai
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-proot']
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: neuroai-redis
    ports:
      - '6379:6379'
    restart: unless-stopped

volumes:
  mysql_data:
